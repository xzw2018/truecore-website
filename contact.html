<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | TrueCore Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <nav class="bg-white shadow-md p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-700">TrueCore Global</h1>
            <div class="space-x-6">
                <a href="index.html" class="text-gray-600 hover:text-blue-500 transition">Home</a>
                <a href="products.html" class="text-gray-600 hover:text-blue-500 transition">Products</a>
                <a href="contact.html" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1">Contact Us</a>
            </div>
        </div>
    </nav>

    <section class="py-16 flex-grow flex items-center justify-center px-4">
        <div class="w-full max-w-lg bg-white p-10 rounded-xl shadow-lg border border-gray-100">
            <h2 class="text-3xl font-bold text-center mb-2 text-gray-800">Request a Quote</h2>
            <p class="text-center text-gray-500 mb-8">Tell us what equipment you need, and our sales team will get back to you with the best prices.</p>
            
            <form action="YOUR_FORMSPREE_LINK" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Company / Your Name *</label>
                    <input type="text" name="name" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Business Email *</label>
                    <input type="email" name="email" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Target Destination</label>
                    <input type="text" name="destination" placeholder="e.g., India, Russia, Nigeria, Kenya, Ethiopia..." class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none transition text-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Equipment Needed (Models/Quantities) *</label>
                    <textarea name="message" rows="5" required placeholder="Please list the specific routers, switches, or modules you are looking for..." class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none transition"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded hover:bg-blue-700 transition shadow-md text-lg mt-4">
                    Send Inquiry
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-900 text-gray-400 text-center py-8 mt-auto">
        <p>&copy; 2026 TrueCore Global. Providing reliable used network equipment worldwide.</p>
    </footer>

</body>
</html>
